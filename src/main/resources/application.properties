# Default settings
spring.profiles.active=dev

# Modbus serial settings
modbus.baudrate=115200
modbus.port=/tmp/ttyUSB0
modbus.retrycount=20
modbus.retrytimeout=3
modbus.updaterange=240
modbus.stale-timeout=2m
modbus.reconnect-delay=5s
modbus.stale-check-delay=10s

# Database settings
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
logging.level.at.co.brandstetter.aircontrol=INFO

# Device settings
duw.deviceregognition=true
# Warning - only use when you know what you're doing
# - deviceregognition must be false for this setting
duw.devicetype=17
